<!DOCTYPE html>
   <html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</body>
</html><title>Calculo de IMC</title>
    <link rel="stylesheet" href="imc.CSS">
</head>
<body>

<header>
    <h1>Calculadora de IMC</h1>
</header>

<main>
    <section class="form-section">
        <h2>Digite seus dados</h2>

        <div id="erro" class="erro"></div>

        <form id="formIMC">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="inputP" step="0.1">

            <label for="altura">Altura (m):</label>
            <input type="number" id="inputA" step="0.01">

            <button type="submit">Calcular IMC</button>
        </form>
    </section>

    <section class="resultado-section">
        <h2>Resultado</h2>
        <p id="resultado"></p>
        <p id="classificacao"></p>
    </section>

    <section class="tabela-section">
        <h2>Tabela de IMC</h2>
        <table>
            <tr>
                <th>IMC</th>
                <th>Classificacao</th>
            </tr>
            <tr><td>&lt; 18.5</td><td>Abaixo do peso</td></tr>
            <tr><td>18.5 - 24.9</td><td>Peso normal</td></tr>
            <tr><td>25.0 - 29.9</td><td>Sobrepeso</td></tr>
            <tr><td>30.0 - 34.9</td><td>Obesidade grau I</td></tr>
            <tr><td>35.0 - 39.9</td><td>Obesidade grau II</td></tr>
            <tr><td>&ge; 40</td><td>Obesidade grau III</td></tr>
        </table>
    </section>
</main>

<footer>
    <p>Calculadora de IMC</p>
</footer>

<script src="imc.js"></script>
</body>
</html>
