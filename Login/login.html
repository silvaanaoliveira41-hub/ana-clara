<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escolha sua Casa</title>
<link rel="stylesheet" href="login.CSS">
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
    <h2>🔐 Entrar</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <select id="casa">
        <option value="">Escolha sua casa</option>
        <option value="grifinoria">Grifinória</option>
        <option value="sonserina">Sonserina</option>
        <option value="corvinal">Corvinal</option>
        <option value="lufalufa">Lufa-Lufa</option>
    </select>

    <button onclick="login()">Entrar</button>

    <button onclick="chapel()">
        🎩 Chapéu Seletor
    </button>

    <p id="erro"></p>
</div>

<!-- MENU -->
<div id="menu" class="card hidden">
    <img id="brasao" class="brasao">

    <h2 id="titulo"></h2>

    <p id="frase"></p>

    <div id="info" class="info"></div>

    <img id="img" class="img">

    <button onclick="logout()">Sair</button>
</div>

</div>

<script src="login.js"></script>
</body>
</html>
