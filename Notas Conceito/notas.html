<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Feine Küche</title>
    <link rel="stylesheet" href="restaurante.CSS">
</head>
<body>

<header>
    <h1>Notas Conceito</h1>
</header>

<main>
    <section class="form-section">
        <h2>Cardapio</h2>

        <form id="formCardapio">
            <label>Bruschetta Gourmet - </label>
            <input type="number" id="inputN" required>

            <label>Carpaccio de Carne</label>
            <input type="text" id="inputA" required>

            <label>Bratwurst Especial</label>
            <input type="number" id="input1" step="0.01" required>

            <label>Apfelstrudel</label>
            <input type="number" id="input2" step="0.01" required>

            <label>Risoto de Cogumelos</label>
            <input type="number" id="input3" step="0.01" required>

            <label>Legumes Grelhados com Molho Especial</label>
            <input type="number" id="input4" step="0.01" required>

            <label>Salada Completa com Grãos</label>
            <input type="number" id="inputE" step="0.01" required>

         
        </form>
    </section>

    <section class="resultado-section">
        <h2>Pedidos</h2>
        <p id="resultado"></p>
    </section>
</main>

<script src="restaurante.js"></script>
</body>
</html>
