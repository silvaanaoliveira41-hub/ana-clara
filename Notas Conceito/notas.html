<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Conceito</title>
    <link rel="stylesheet" href="notas.CSS">
</head>
<body>

<header>
    <h1>Notas Conceito</h1>
</header>

<main>
    <section class="form-section">
        <h2>Digite seus dados</h2>

        <form id="formNOTAS">
            <label>Número do aluno:</label>
            <input type="number" id="inputN" required>

            <label>Nome do aluno:</label>
            <input type="text" id="inputA" required>

            <label>Nota 1:</label>
            <input type="number" id="input1" step="0.01" required>

            <label>Nota 2:</label>
            <input type="number" id="input2" step="0.01" required>

            <label>Nota 3:</label>
            <input type="number" id="input3" step="0.01" required>

            <label>Nota 4:</label>
            <input type="number" id="input4" step="0.01" required>

            <label>Média dos Exercícios:</label>
            <input type="number" id="inputE" step="0.01" required>

            <button type="submit">Calcular</button>
        </form>
    </section>

    <section class="resultado-section">
        <h2>Resultado</h2>
        <p id="resultado"></p>
    </section>
</main>

<script src="notas.js"></script>
</body>
</html>
