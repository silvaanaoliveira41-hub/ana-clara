<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Professor - Layout Flex</title>
  <link rel="stylesheet" href="flex.css">
</head>
<body>

  <!-- LINHA 1 -->
  <div class="linha linha1">
    <div class="coluna">1.1</div>
    <div class="coluna">1.2</div>
  </div>

  <!-- LINHA 2 -->
  <div class="linha linha2">
    <div class="coluna">2.1</div>
    <div class="coluna">2.2</div>
  </div>

  <!-- LINHA 3 -->
  <div class="linha linha3">
    <div class="coluna">3.1</div>

    <div class="coluna coluna3-direita">
      <div class="item">
        <img src="./imagens/gato01.jpeg">
        <p>Gato</p>
      </div>

      <div class="item">
        <img src="./imagens/cachorro.jpeg">
        <p>Cachorro</p>
      </div>

      <div class="item">
        <img src="./imagens/coelho.jpg">
        <p>Coelho</p>
      </div>
    </div>
  </div>

  <!-- LINHA 4 -->
  <div class="linha linha4">
    <div class="coluna coluna4-esquerda">
      <div class="item">
        <img src="./imagens/casa.jpeg">
        <p>Casa</p>
      </div>

      <div class="item">
        <img src="./imagens/castelo.jpeg">
        <p>Castelo</p>
      </div>
    </div>

    <div class="coluna coluna4-direita">
      <div class="metade">4.2.1</div>
      <div class="metade">4.2.2</div>
    </div>

</html>
