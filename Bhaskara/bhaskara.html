<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskara</title>
    <link rel="stylesheet" href="bhaskara.css">
</head>

<body>

    <header>
        Exemplo do uso de tags semânticas e CSS
    </header>

    <main>
        <section>
            <h1>Bhaskara</h1>

            <label for="inputA" id="labelDoInputA">Valor A</label>
            <input type="number" id="inputA">

            <label for="inputB">Valor B</label>
            <input type="number" id="inputB">

            <label for="inputC">Valor C</label>
            <input type="number" id="inputC">

            <button onclick="funcaoCalcular()">Calcular</button>

            <div class="resultado">
                <p><strong>X1:</strong> <span id="respX1">0</span></p>
                <p><strong>X2:</strong> <span id="respX2">0</span></p>
            </div>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="bhaskara.js"></script>

</body>

</html>
