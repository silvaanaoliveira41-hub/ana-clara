<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Torneio Juvenil</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <main>
        <header>
            <h1>Cadastro de Atleta</h1>
            <p>Preencha os dados para verificar a elegibilidade e gerar a autorização.</p>
        </header>

        <section>
            <form id="formInscricao" action="autorizacao.html" method="GET">
                <div class="campo">
                    <label for="nome">Nome Completo do Atleta:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo dupla">
                    <div>
                        <label for="cpf">CPF do Atleta:</label>
                        <input type="text" id="cpf" name="cpf" required>
                    </div>
                    <div>
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" name="idade" min="1" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="responsavel">Nome do Responsável:</label>
                    <input type="text" id="responsavel" name="responsavel" required>
                </div>

                <div class="campo dupla">
                    <div>
                        <label for="origem">Cidade de Origem:</label>
                        <input type="text" id="origem" name="origem" required>
                    </div>
                    <div>
                        <label for="destino">Cidade de Destino:</label>
                        <input type="text" id="destino" name="destino" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="modalidade">Modalidade Esportiva:</label>
                    <select id="modalidade" name="modalidade" required>
                        <option value="" disabled selected>Selecione uma opção...</option>
                        <option value="Vôlei">Vôlei</option>
                        <option value="Futebol">Futebol</option>
                        <option value="Natação">Natação</option>
                    </select>
                </div>

                <button type="submit">Validar Inscrição e Gerar Autorização</button>
            </form>
        </section>
    </main>

    <script src="index.js"></script>
</body>

</html>
